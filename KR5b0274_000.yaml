front:
  text: 上清大洞九宫朝修祕訣上道四九
  hash: sha256:6b64dc43b28cd6cad1fb297859e66039c950446d39dacfad31a308db0f0ba87a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0274_HFL_000-001a, image: hfl/0319/0319-146.png}
body:
  text: 兩峯周德大嗣傳雌一四宫一寸為玉帝宫玉清神母居之在洞明兩夾間上一寸二寸為天庭宫上清真女居之在洞泥兩夾間上二寸三寸為極真宫太微帝君居之在泥流兩夾間上三寸四寸為太皇宫太皇君后居之在流玄兩夾間上四寸雄一五宫一寸為明堂宫長生大帝居之二寸為洞房宫中央黃老君居之三寸為丹田宫元始上帝居之四寸為流珠宫太上道君居之五寸為玄丹宫玉皇大帝居之明堂宫玉帝宫洞房宫天庭宫丹田宫極真宫流珠宫太皇宫女丹宫明堂宫上道第一自兩眉角入骨三寸左曰絳臺青房右曰黃闕紫户其絳臺以紅玉為臺青玉為房中有大神衣青錦衣執流金火鈴名正心字切方黃闕以黃玉為臺紫玉為房中有大神衣黃錦衣執流金火鈴名平靜字法王口吐青黃紫雲之氣坐於其中禁遏一切邪魅之氣如耳內有金聲玉振之音乃是外事來入宫二神鳴金鐘玉磬以告九宫急摩兩手令熱掩耳門叩齒九通閉息心呪曰赤子在宫九宫在房請聽靈命以却不祥太一流火除厄去殃呪畢覺面熱是邪氣至急存二神擲流金火鈴自兩眉角出良久再兩手相摩令熱掩耳如覺頭面溫溫然即邪氣去矣如覺森森然即是邪氣未去再叩齒九過心呪三遍二神擲流金火鈴遍於泥丸其邪立出然後略卧少時立愈入眉一寸名明堂宫左有日象徑九分紫光九芒右有月象徑一寸黃光十芒中有明鏡神君貌如嬰兒始生之形衣緑錦衣帶流金火鈴口銜赤玉鏡有赤光乃長生大帝君分神也號明堂真君名四明字照精左有明童真君如帝君象乃韓君丈人分神也名玄陽字少清右有明女真君亦如帝君象名玄隂字少元兆三呼名字叩齒九通心呪曰紫户青房中有大神切法方王次入明堂玄明元清四明照精坐鎮明堂口銜玉鏡斷除不祥流金火鈴除凶去殃如夜行路暗存三君以赤玉鏡照路如光良久自明以逢凶人惡鬼經過邪廟及凶賊之地存三君振赤玉鏡如雷霆聲兵賊惡鬼並皆震仆如遇瘟疫邪氣寒熱干身即存三君振玉鏡四十九聲變成大火焚兆一身良久汙出溫然其病頓愈凡行路缺食用乏即存三君振赤玉鏡三十六聲鏡中赤氣變成紅液舌柱上腭滿口含津勿咽片時溫溫分作三咽三次用之飢渴頓除凡遇耳中聞敲榼揚波撾鼓之聲是體中勞倦將沉痾急焚香於靜室內仰卧存三君振玉鏡二十四下赤氣遍身化為大火錬形通赤一時良久其疾頓除凡遇無故忽見聚血及聞血腥之氣皆主兵橫惡凶之災急持齊入室不接人事求救於三元帝君及明堂三君一月乃至變凶為吉或遇惡夢轉枕及被左手撫心叩齒二十四通密祝曰大洞真玄章錬三魂受心節度速啓太上三元宫向遇不祥之夢是七魄遊尸來協邪源急召桃康護命上告帝君五老九真皆守體門黃闕神師紫户將軍把鉞搖鈴消磨惡精反凶成吉生死無緣三祝之良久放四大略寢必有吉慶行之三年更無一切之夢似夢見境皆是未來吉凶洞房宫上道第二兆入室焚香叩齒端坐寧心息慮存中有黃老帝君口吐紫氣自己以鼻引氣咽之三十五過治三界水火刀兵人間千災萬難延續壽算回死作生如大洞回風混合之道存自已在黃老帝君之側默誦九章八十一章計九過共為一遍則三界舉名五帝注位列為真人一身萬神俱備然後吐納紫氣灌溉一身泥丸宫上道第三兆入室焚香叩齒端坐寧心息慮存中有天帝君如嬰兒始生之形衣紅錦衣坐日中誦三天諱乃元始分身也左有上元赤子帝君如嬰兒始生形著赤繡華衣名凝肇天字元先手執神虎符右有帝卿亦如嬰兒始生形著赤繡華衣名肇精字玄生手執大洞真經七星覆上以柄前指宫中有紫氣衝天九萬里流珠宫上道第四兆入室焚香叩齒端坐寧心息慮存流珠真神乃太上道君分神也亦能攝衆行事又是羣仙所居之宫也玄丹宫上道第五兆入室焚香祝啓紫微玄丹宫太一中皇帝君諱厥規英字曰化元金牀玉帳紫繡錦裙腰帶火鈴斬邪滅姦手把星精項生圎光正坐吐氣滅跡妖煙與神同宴與氣元丹和魂錬魄使保飛仙臣今信禮萬化生成次焚香存北斗中有紫氣一道如繩下降從眉間入玄丹宫次存斗口中有日象下降從兆眉間直入宫中須㬰如紫霧遍滿腦中如火珠之狀良久忽見玄丹君從斗口下降從眉間入宫坐日中衣紫繡瓊衣腰紫繡華裙頂紫玉晨冠左手執斗柄乃魒星也右手執璇根乃紫微垣斗口相對排六星橫列光明第六星也口吐紫氣氤氲腰帶火鈴次存自已形如蓮實大青衣冠服秉簡於玄丹君前九拜心祝曰規英化元三呼之叩齒九通良久玄丹君與兆乘絳氣同入斗中金臺玉殿琅玕寶帳金牀玉几兆與玄丹君三拜跪吞服紫氣八十一口玄丹君同兆乘紫氣回玄丹宫坐兆因憩息於玄丹君前定意良久即有竒報候片時定息出室常如此行之次遇立春春分乘紫氣入斗至陽明星各飲青氣九口立夏夏至至丹元星飲赤氣三口立秋秋分至隂精星各飲白氣七口立冬冬至至玄冥星各飲黑氣五口四季至天關星飲黃氣十二口畢太一與兆同歸自已玄丹宫兆却自已心中行之十八年千騎萬乘迎子白日升晨其功至妙却遏萬魔不可具述若行此道不必更行三一之法也雌四宫真一內神寶名玉訣凡學上真之道不知雌真一之內名萬不得仙也學者受師口訣然後奉行玉清神母姓廉名銜字荒彥長九寸九分著玄黃素靈之綬頭戴七稱珠玉之髻冠無極進賢之冠居無上之太極珠宫中七寶之府五靈鄉玄元里下治兆身玉帝宫上清真女姓厥名回字弼類長六寸六分著青寶神光錦繡雲霞九色之綬頭戴玉寶飛雲之髻冠玄黃進賢之冠居無上之上太上崑崙太幽宫明堂府九光鄉大化里下治兆身天庭宫太極帝妃姓玄名虛生字伯無長七寸七分著玄羅流光五色鳳文之綬頭戴七寶玄雲之髻冠無極進賢之冠居元景之上太清極玄宫中玉房府三丹鄉丹元里下治兆身極真宫太上君后姓遷名含孩字合賢生長三寸三分著七寶飛精玄光雲錦霜羅九色文綬頭戴九玄玉精頽雲之髻冠玄黃無極三寶玉冠居太清九玄之上洞浮極真宫中丹精府雲光鄉玄玄里下治兆身太皇宫夫行玄丹之道守三一之訣當存四宫雌真一之神衣服形名諱鄉居所在此寶經之上篇以傳見成真人者始學不得其要素靈所祕不行於世凡受上真之法三寶神經雖通靈究微不知雌真一之法亦無所成矣故太上摽且重禁格於輕泄不載於紙墨有者宜審實內心然後受焉每以正旦月朔及太歲本生之日沐浴清齊入室東向存思四宫雌真一之神鄉居姓名服色長短如上法畢叩齒三十六通呪曰太真隂神號曰女靈變景九玄乘真隱冥日告天玄告齊上清心念目矚洞鑒神形還宫守宅玉華芳盈五色變化流黃紫青運致飛霞上造帝庭呪畢咽氣三十六過止如此九年面生玉華金真映光神見軀形與兆共言子既見神心知自己愼勿妄傳此四宫雌真一之神是天生始生之隂官受號帝妃其元氣未立五政未開光景未通無極無虛無上無下無外無內無左無右無前無後太上之元精玄始之妙真虛極之先結氣而凝混化萬物天地得存皆由四真也能有志心存思者千齡不知先天之中萬神同壽也上清大洞九宫朝修祕訣上道
