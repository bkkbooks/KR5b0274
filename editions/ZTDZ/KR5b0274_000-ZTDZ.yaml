front:
  text: 上清大洞九宫朝修祕訣上道四九
  hash: sha256:6b64dc43b28cd6cad1fb297859e66039c950446d39dacfad31a308db0f0ba87a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0274_SJB_000-100660a, image: sjb/10/100660a.png}
body:
  text: 兩峯周德大嗣傳雌一四宫一寸爲玉帝宫玉清神母居之在洞明兩夾間上一寸二寸爲天庭宫上清眞女居之在洞泥兩夾間上二寸三寸爲極眞宫太微帝君居之在泥流兩夾間上三寸四寸爲太皇宫太皇君后居之在流玄兩夾間上四寸雄一五宫一寸爲明堂宫長生大帝居之二寸爲洞房宫中央黃老君居之三寸爲丹田宫元始上帝居之四寸爲流珠宫太上道君居之五寸爲玄丹宫玉皇大帝居之明堂宫玉帝宫洞房宫天庭宫丹田宫極眞宫流珠宫太皇宫女丹宫明堂宫上道第一自兩眉角入骨三寸左曰絳臺青房右曰黃闕紫户其絳臺以紅玉爲臺青玉爲房中有大神衣青錦衣執流金火鈴名正心字切方黃闕以黃玉爲臺紫玉爲房中有大神衣黄錦衣執流金火鈴名平靜字法王口吐青黃紫雲之氣坐於其中禁遏一切邪魅之氣如耳内有金聲玉振之音乃是外事來入宫二神鳴金鐘玉磬以告九宫急摩兩手令熱掩耳門叩齒九通閉息心呪曰赤子在宫九宫在房請聽靈命以却不祥太一流火除厄去殃呪畢覺面熱是邪氣至急存二神擲流金火鈴自兩眉角出良久再兩手相摩令熱掩耳如覺頭面温温然即邪氣去矣如覺森森然即是邪氣未去再叩齒九過心呪三徧二神擲流金火鈴徧於泥丸其邪立出然後畧卧少時立愈入眉一寸名明堂宫左有日象徑九分紫光九芒右有月象徑一寸黃光十芒中有明鏡神君貌如嬰兒始生之形衣緑錦衣帶流金火鈴口㘅赤玉鏡有赤光乃長生大帝君分神也號明堂眞君名四明字照精左有明童眞君如帝君象乃韓君丈人分神也名玄陽字少清右有明女眞君亦如帝君象名玄隂字少元兆三呼名字叩齒九通心呪曰紫户青房中有大神切法方王次入明堂玄明元清四明照精坐鎭明堂口㘅玉鏡斷除不祥流金火鈴除兇去殃如夜行路暗存三君以赤玉鏡照路如光良久自明以逢兇人惡鬼經過邪廟及兇賊之地存三君振赤玉鏡如雷霆聲兵賊惡鬼並皆震仆如遇瘟疫邪氣寒熱干身即存三君振玉鏡四十九聲變成大火焚兆一身良久汙出温然其病頓愈凡行路缺食用乏即存三君振赤玉鏡三十六聲鏡中赤氣變成紅液舌柱上腭滿口含津勿咽片時温温分作三咽三次用之飢渴頓除凡遇耳中聞敲榼揚波撾鼔之聲是體中勞倦將沉痾急焚香於靜室内仰卧存三君振玉鏡二十四下赤氣徧身化爲大火錬形通赤一時良久其疾頓除凡遇無故忽見聚血及聞血腥之氣皆主兵横惡兇之災急持齋入室不接人事求救於三元帝君及明堂三君一月乃至變兇爲吉或遇惡夢轉枕及被左手撫心叩齒二十四通宻祝曰大洞眞玄章錬三魂受心節度速啓太上三元宫向遇不祥之夢是七魄遊尸來恊邪源急召桃康護命上告帝君五老九眞皆守體門黃闕神師紫户將軍把鉞摇鈴消磨惡精反兇成吉生死無縁三祝之良久放四大畧寢必有吉慶行之三年更無一切之夢似夢見境皆是未來吉凶洞房宫上道第二兆入室焚香叩齒端坐寧心息慮存中有黃老帝君口吐紫氣自己以鼻引氣咽之三十五過治三界水火刀兵人間千災萬難延續壽筭回死作生如大洞回風混合之道存自已在黃老帝君之側黙誦九章八十一章計九過共爲一徧則三界舉名五帝注位列爲眞人一身萬神俱備然後吐納紫氣灌溉一身泥丸宫上道第三兆入室焚香叩齒端坐寧心息慮存中有天帝君如嬰兒始生之形衣紅錦衣坐日中誦三天諱乃元始分身也左有上元赤子帝君如嬰兒始生形著赤綉華衣名凝肇天字元先手執神虎符右有帝卿亦如嬰兒始生形著赤綉華衣名肇精字玄生手執大洞眞經七星覆上以柄前指宫中有紫氣衝天九萬里流珠宫上道第四兆入室焚香叩齒端坐寧心息慮存流珠眞神乃太上道君分神也亦能攝衆行事又是羣仙所居之宫也玄丹宫上道第五兆入室焚香祝啓紫微玄丹宫太一中皇帝君諱厥規英字曰化元金牀玉帳紫綉錦裙腰帶火鈴斬邪滅姦手把星精項生圎光正坐吐氣滅跡妖煙與神同宴與氣元丹和魂錬魄使保飛仙臣今信禮萬化生成次焚香存北斗中有紫氣一道如繩下降從眉間入玄丹宫次存斗口中有日象下降從兆眉間直入宫中須㬰如紫霧徧滿腦中如火珠之狀良久忽見玄丹君從斗口下降從眉間入宫坐日中衣紫綉瓊衣腰紫綉華裙頂紫玉晨冠左手執斗柄乃魒星也右手執璇根乃紫微垣斗口相對排六星横列光明第六星也口吐紫氣氤氲腰帶火鈴次存自已形如蓮實大青衣冠服秉簡於玄丹君前九拜心祝曰規英化元三呼之叩齒九通良久玄丹君與兆乗絳氣同入斗中金臺玉殿琅玕寳帳金牀玉几兆與玄丹君三拜跪吞服紫氣八十一口玄丹君同兆乗紫氣囬玄丹宫坐兆因憇息於玄丹君前定意良久即有竒報候片時定息出室常如此行之次遇立春春分乗紫氣入斗至陽明星各飲青氣九口立夏夏至至丹元星飲赤氣三口立秋秋分至隂精星各飲白氣七口立冬冬至至玄㝠星各飲黒氣五口四季至天關星飲黃氣十二口畢太一與兆同歸自已玄丹宫兆却自已心中行之十八年千騎萬乗迎子白日昇晨其功至妙却遏萬魔不可具述若行此道不必更行三一之法也雌四宫眞一内神寳名玉訣凡學上眞之道不知雌眞一之内名萬不得仙也學者受師口訣然後奉行玉清神母姓廉名銜字荒彦長九寸九分著玄黃素靈之綬頭戴七稱珠玉之髻冠無極進賢之冠居無上之太極珠宫中七寳之府五靈郷玄元里下治兆身玉帝宫上清眞女姓厥名回字弼𩔖長六寸六分著青寳神光錦綉雲霞九色之綬頭戴玉寳飛雲之髻冠玄黃進賢之冠居無上之上太上崑崙太幽宫明堂府九光郷大化里下治兆身天庭宫太極帝妃姓玄名虚生字伯無長七寸七分著玄羅流光五色鳳文之綬頭戴七寳玄雲之髻冠無極進賢之冠居元景之上太清極玄宫中玉房府三丹郷丹元里下治兆身極眞宫太上君后姓遷名含孩字合賢生長三寸三分著七寳飛精玄光雲錦霜羅九色文綬頭戴九玄玉精頽雲之髻冠玄黃無極三寳玉冠居太清九玄之上洞浮極眞宫中丹精府雲光郷玄玄里下治兆身太皇宫夫行玄丹之道守三一之訣當存四宫雌眞一之神衣服形名諱郷居所在此寳經之上篇以傳見成眞人者始學不得其要素靈所祕不行於世凡受上眞之法三寳神經雖通靈究微不知雌眞一之法亦無所成矣故太上摽且重禁格於輕泄不載於紙墨有者宜審實内心然後受焉每以正旦月朔及太歲本生之日沐浴清齋入室東向存思四宫雌眞一之神郷居姓名服色長短如上法畢叩齒三十六通呪曰太眞隂神號曰女靈變景九玄乗眞隱㝠日告天玄告齋上清心念目矚洞鑒神形還宫守宅玉華芳盈五色變化流黃紫青運致飛霞上造帝庭呪畢咽氣三十六過止如此九年面生玉華金眞映光神見軀形與兆共言子既見神心知自己愼勿妄傳此四宫雌眞一之神是天生始生之隂官受號帝妃其元氣未立五政未開光景未通無極無虚無上無下無外無内無左無右無前無後太上之元精玄始之妙眞虚極之先結氣而凝混化萬物天地得存皆由四眞也能有志心存思者千齡不知先天之中萬神同壽也上清大洞九宫朝修祕訣上道
